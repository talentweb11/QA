name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - "5432:5432"
        # Wait until Postgres is actually ready before tests start.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: testuser
      DB_PASSWORD: testpass
      DB_NAME: testdb

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run pytest
        run: pytest -v
        working-directory: backend

  # ----------------------------------------------------------------------
  # Frontend: lint and build. The build step runs `tsc -b`, so it also
  # acts as a type check. Unit tests are commented out until vitest is
  # installed and at least one test file exists (otherwise CI fails).
  # ----------------------------------------------------------------------
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Unit tests
        run: npm test
        working-directory: frontend

      - name: Build (also type-checks via tsc)
        run: npm run build
        working-directory: frontend

  # ----------------------------------------------------------------------
  # Docker: confirm the images still build from the Dockerfiles.
  # docker-compose.yml references `env_file: .env`, which is gitignored,
  # so we copy the example file to satisfy compose during the build.
  # (Values are only needed at runtime, not at build time.)
  # ----------------------------------------------------------------------
  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Provide a dummy .env for compose
        run: cp .env.example .env

      - name: Build images
        run: docker compose build
