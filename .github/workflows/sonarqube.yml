name: SonarQube Analysis

on:
  push:
    branches: [ main ]        # was 'master' — GitHub default branch is 'main'
  pull_request:
    branches: [ main ]

jobs:
  sonarqube:
    name: Analyze with SonarQube
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # SonarQube needs full history for accurate blame/new-code

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22     # was 18 (EOL); 22 is current Active LTS
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8   # was @master — pin to a release
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
